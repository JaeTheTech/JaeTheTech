name: Update years in README

on:
  schedule:
    - cron: '0 0 1 1 *'   # midnight UTC every January 1st
  workflow_dispatch:        # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Calculate years and update README
        run: |
          YEAR=$(date +%Y)
          TECH=$(( YEAR - 2013 ))
          BUILD=$(( YEAR - 2016 ))
          CODE=$(( YEAR - 2020 ))

          # Update typing SVG: "13%2B+years+in+tech"
          sed -i -E "s/[0-9]+%2B\+years\+in\+tech/${TECH}%2B+years+in+tech/g" README.md

          # Update about.js comments: // 13+ years, // 10+ years, // 6+ years
          sed -i -E "s|inTechSince:  2013,  // [0-9]+\+|inTechSince:  2013,  // ${TECH}+|" README.md
          sed -i -E "s|buildingSince: 2016, // [0-9]+\+|buildingSince: 2016, // ${BUILD}+|" README.md
          sed -i -E "s|codingSince:   2020, // [0-9]+\+|codingSince:   2020, // ${CODE}+|" README.md

          # Update facts.conf
          sed -i -E "s|since   = 2013 tech / 2016 hardware / 2020 code|since   = 2013 tech / 2016 hardware / 2020 code|" README.md
          sed -i -E "s|real    = [0-9]+\+ years|real    = ${TECH}+ years|" README.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "Auto-update year counts in README" && git push)
