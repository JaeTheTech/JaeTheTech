name: Update years in README

on:
  schedule:
    - cron: '0 0 1 1 *'   # midnight UTC every January 1st
  workflow_dispatch:        # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Calculate years and update README
        run: |
          YEAR=$(date +%Y)
          TECH_YEARS=$(( YEAR - 2013 ))
          BUILD_YEARS=$(( YEAR - 2016 ))
          CODE_YEARS=$(( YEAR - 2020 ))

          # Update typing SVG line (URL-encoded "13%2B+Years")
          sed -i -E "s/[0-9]+%2B\+Years\+in\+Tech/${TECH_YEARS}%2B+Years+in+Tech/g" README.md

          # Update Python class: self.years_in_tech comment
          sed -i -E "s/# [0-9]+\+/# ${TECH_YEARS}+/g" README.md

          # Update Quick Facts line
          sed -i -E "s/In tech since 2013 · building PCs since 2016 · writing code since 2020/In tech since 2013 · building PCs since 2016 · writing code since 2020/" README.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "Auto-update year counts in README" && git push)
