name: Update Profile

on:
  schedule:
    - cron: '0 */6 * * *'     # every 6 hours — keeps stats fresh
  push:
    branches: [main]           # refresh on any push
  workflow_dispatch:            # manual trigger
  repository_dispatch:
    types: [update-profile]    # cross-repo trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          YEAR=$(date +%Y)
          TECH=$(( YEAR - 2013 ))
          BUILD=$(( YEAR - 2016 ))
          CODE=$(( YEAR - 2020 ))

          # --- Year counts (typing SVG) ---
          sed -i -E "s/[0-9]+%2B\+years\+in\+tech/${TECH}%2B+years+in+tech/g" README.md

          # --- Year counts (about.js) ---
          sed -i -E "s|inTechSince:  2013,  // [0-9]+\+|inTechSince:  2013,  // ${TECH}+|" README.md
          sed -i -E "s|buildingSince: 2016, // [0-9]+\+|buildingSince: 2016, // ${BUILD}+|" README.md
          sed -i -E "s|codingSince:   2020, // [0-9]+\+|codingSince:   2020, // ${CODE}+|" README.md

          # --- Year counts (facts.conf) ---
          sed -i -E "s|real    = [0-9]+\+ years|real    = ${TECH}+ years|" README.md

          # --- Public repo count from GitHub API ---
          PUBLIC=$(gh api /users/JaeTheTech --jq '.public_repos' 2>/dev/null || echo "")
          if [ -n "$PUBLIC" ] && [ "$PUBLIC" != "null" ]; then
            CURRENT_PRIVATE=$(grep -o 'private: [0-9]*' README.md | grep -o '[0-9]*' || echo "12")
            sed -i -E "s|repos: \{ public: [0-9]+, private: [0-9]+ \}|repos: { public: ${PUBLIC}, private: ${CURRENT_PRIVATE} }|" README.md
          fi

          # --- Cache-bust stat card images ---
          TS=$(date +%s)
          sed -i -E "s|_ts=[0-9]+|_ts=${TS}|g" README.md

          # --- Update timestamp ---
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          sed -i -E "s|<!-- updated: .* -->|<!-- updated: ${TIMESTAMP} -->|" README.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "Auto-update profile" && git push)
